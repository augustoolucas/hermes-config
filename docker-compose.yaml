services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
      - "9119:9119"
    volumes:
      - ~/.hermes:/opt/data
    networks:
      - hermes-net
    environment:
      - HERMES_DASHBOARD=true
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GOOGLE_SERVICE_ACCOUNT_PATH=${GOOGLE_SERVICE_ACCOUNT_PATH}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - SEARXNG_URL=http://searxng-core:8080
      - FIRECRAWL_API_URL=http://crw:3000
      - WIKI_PATH=/opt/data/wiki
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  searxng-core:
    container_name: searxng-core
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: ./searxng/.env
    volumes:
      - ./searxng/core-config/:/etc/searxng/:Z
      - searxng-core-data:/var/cache/searxng/
    networks:
      - hermes-net

  searxng-valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - searxng-valkey-data:/data/
    networks:
      - hermes-net

  crw:
    container_name: crw
    image: ghcr.io/us/crw:latest
    restart: unless-stopped
    depends_on:
      lightpanda:
        condition: service_started
    environment:
      - RUST_LOG=info
    networks:
      - hermes-net
    mem_limit: 512m
    memswap_limit: 512m

  lightpanda:
    container_name: lightpanda
    image: lightpanda/browser:latest
    restart: unless-stopped
    networks:
      - hermes-net
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9222"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  hermes-net:
    driver: bridge

volumes:
  searxng-core-data:
  searxng-valkey-data:
